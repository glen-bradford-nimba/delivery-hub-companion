<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Hub Companion</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="dh-header">
            <div class="dh-logo">
                <img src="../icons/icon-32.png" alt="" width="20" height="20">
                <span class="dh-brand">Delivery Hub</span>
            </div>
            <div class="dh-header-actions">
                <button id="btn-refresh" class="dh-icon-btn" title="Refresh work items">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                </button>
                <button id="btn-settings" class="dh-icon-btn" title="Settings">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Offline queue banner -->
        <div id="offline-banner" class="dh-offline-banner" style="display: none;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
            <span><span id="offline-count">0</span> items queued for sync</span>
        </div>

        <!-- Not connected state -->
        <div id="view-connect" class="dh-view" style="display: none;">
            <div class="dh-empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
                    <path d="M18.36 5.64a9 9 0 11-12.73 0"/>
                    <line x1="12" y1="2" x2="12" y2="12"/>
                </svg>
                <p class="dh-empty-title">Not Connected</p>
                <p class="dh-empty-text">Connect to your Salesforce org to view work items, log hours, and create voice notes.</p>
                <button id="btn-go-settings" class="dh-btn dh-btn-primary">Open Settings</button>
            </div>
        </div>

        <!-- Main tabbed view -->
        <div id="view-main" class="dh-view" style="display: none;">
            <!-- Tab bar -->
            <div class="dh-tabs">
                <button class="dh-tab dh-tab--active" data-tab="items">My Items</button>
                <button class="dh-tab" data-tab="log">Quick Log</button>
                <button class="dh-tab" data-tab="voice">Voice Note</button>
            </div>

            <!-- Tab: My Items -->
            <div id="tab-items" class="dh-tab-content">
                <div id="items-loading" class="dh-loading">
                    <div class="dh-spinner"></div>
                    <span>Loading work items...</span>
                </div>
                <div id="items-error" class="dh-items-error" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="items-error-text"></span>
                </div>
                <div id="items-list" class="dh-items-list"></div>
                <div id="items-empty" class="dh-empty-state" style="display: none;">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/>
                    </svg>
                    <p class="dh-empty-text" style="margin-top: 12px;">No active work items found.<br>Items assigned to you will appear here.</p>
                </div>
            </div>

            <!-- Tab: Quick Log -->
            <div id="tab-log" class="dh-tab-content" style="display: none;">
                <div class="dh-form-group">
                    <label for="log-item">Work Item</label>
                    <select id="log-item" class="dh-select"></select>
                </div>
                <div class="dh-form-group">
                    <label for="log-hours">Hours</label>
                    <input id="log-hours" type="number" min="0.25" step="0.25" value="1" class="dh-input">
                </div>
                <div class="dh-form-group">
                    <label for="log-notes">Notes</label>
                    <textarea id="log-notes" rows="3" class="dh-textarea" placeholder="What did you work on?"></textarea>
                </div>
                <button id="btn-log-submit" class="dh-btn dh-btn-primary dh-btn-full">Log Hours</button>
                <div id="log-status" class="dh-status" style="display: none;"></div>
            </div>

            <!-- Tab: Voice Note -->
            <div id="tab-voice" class="dh-tab-content" style="display: none;">
                <div class="dh-voice-area">
                    <button id="btn-mic" class="dh-mic-btn" title="Start recording">
                        <svg id="mic-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="1" width="6" height="12" rx="3"/>
                            <path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/>
                        </svg>
                    </button>
                    <p id="voice-status" class="dh-voice-status">Tap to start dictating</p>
                </div>
                <div id="voice-transcript" class="dh-transcript" style="display: none;">
                    <label>Transcript</label>
                    <p id="voice-text"></p>
                </div>
                <div id="voice-controls" style="display: none;">
                    <div class="dh-form-group">
                        <label for="voice-priority">Priority</label>
                        <select id="voice-priority" class="dh-select">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <button id="btn-voice-create" class="dh-btn dh-btn-primary dh-btn-full">Create Work Item</button>
                </div>
                <div id="voice-result" class="dh-status" style="display: none;"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="dh-footer">
            <span class="dh-footer-version">v1.1</span>
            <a href="https://cloudnimbusllc.com/delivery-hub" target="_blank" rel="noopener">cloudnimbusllc.com</a>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
